<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Razgon{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f8f9fc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #fafaff;
            --border-subtle: rgba(0,0,0,0.06);
            --border-light: rgba(0,0,0,0.1);
            --text-primary: #080810;
            --text-secondary: #3a3f55;
            --accent: #3b82f6;
            --accent-soft: rgba(59,130,246,0.08);
            --accent-glow: rgba(59,130,246,0.15);
            --success: #00b894;
            --danger: #e17055;
            --shadow-card: 0 2px 16px rgba(59,130,246,0.06), 0 1px 4px rgba(0,0,0,0.04);
            --shadow-card-hover: 0 8px 32px rgba(59,130,246,0.12), 0 2px 8px rgba(0,0,0,0.06);
            --shadow-glow: 0 0 24px rgba(59,130,246,0.1);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar */
        .navbar-custom {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0.75rem 0;
        }
        .navbar-custom .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--text-primary);
        }
        .navbar-custom .navbar-brand span {
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Cards */
        .rz-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .rz-card:hover {
            background: var(--bg-card-hover);
            box-shadow: var(--shadow-card-hover);
            border-color: rgba(59,130,246,0.15);
        }
        .rz-card h6 {
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        /* Buttons */
        .btn-accent {
            background: linear-gradient(135deg, var(--accent), #06b6d4);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 500;
            padding: 0.65rem 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59,130,246,0.25);
        }
        .btn-accent:hover {
            background: linear-gradient(135deg, #2563eb, var(--accent));
            color: white;
            box-shadow: 0 6px 25px rgba(59,130,246,0.35);
            transform: translateY(-1px);
        }
        .btn-ghost {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            font-weight: 500;
            padding: 0.5rem 1rem;
            transition: all 0.2s ease;
        }
        .btn-ghost:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--border-light);
        }
        .btn-danger-ghost {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(225,112,85,0.2);
            border-radius: var(--radius-sm);
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }
        .btn-danger-ghost:hover {
            background: rgba(225,112,85,0.06);
            color: var(--danger);
            border-color: rgba(225,112,85,0.4);
        }

        /* Hero */
        .hero-section {
            background: linear-gradient(180deg, rgba(59,130,246,0.06) 0%, transparent 60%);
            padding: 100px 0 60px;
            text-align: center;
        }
        .hero-section h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #1a1a2e 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-section p {
            color: var(--text-secondary);
            font-size: 1.15rem;
            max-width: 600px;
            margin: 0 auto 2rem;
            line-height: 1.6;
        }

        /* Feature cards */
        .feature-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-card);
        }
        .feature-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-card-hover), var(--shadow-glow);
            border-color: rgba(59,130,246,0.15);
        }
        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        /* Chat */
        .chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 1rem;
            background: var(--bg-primary);
        }
        .chat-msg { margin-bottom: 12px; }
        .chat-msg.user { text-align: right; }
        .chat-msg .bubble {
            display: inline-block;
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .chat-msg.user .bubble {
            background: linear-gradient(135deg, var(--accent), #06b6d4);
            color: white;
        }
        .chat-msg.assistant .bubble {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
        }
        .chat-input {
            background: var(--bg-primary) !important;
            border: 1px solid var(--border-subtle) !important;
            border-radius: var(--radius-sm) !important;
            color: var(--text-primary) !important;
            padding: 0.75rem 1rem;
        }
        .chat-input:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px var(--accent-soft) !important;
        }
        .chat-input::placeholder { color: var(--text-secondary) !important; }

        /* Accordion */
        .accordion-custom .accordion-item {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius) !important;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }
        .accordion-custom .accordion-button {
            background: var(--bg-card);
            color: var(--text-primary);
            font-weight: 500;
            font-size: 1rem;
            padding: 1rem 1.25rem;
            box-shadow: none;
        }
        .accordion-custom .accordion-button:not(.collapsed) {
            background: var(--bg-card-hover);
            box-shadow: none;
        }
        .accordion-custom .accordion-body {
            background: var(--bg-primary);
            border-top: 1px solid var(--border-subtle);
            padding: 1.25rem;
        }

        /* Tables */
        .table-light-custom {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-primary);
            --bs-table-border-color: var(--border-subtle);
            font-size: 0.85rem;
        }
        .table-light-custom thead th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-light);
        }

        /* Spinner */
        .rz-spinner {
            color: var(--accent);
        }

        /* Progress */
        .progress-custom {
            background: var(--border-subtle);
            height: 4px;
            border-radius: 2px;
        }
        .progress-custom .progress-bar {
            background: linear-gradient(90deg, var(--accent), #a78bfa);
        }

        /* Project card */
        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-card);
        }
        .project-card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(59,130,246,0.15);
            box-shadow: var(--shadow-card-hover), var(--shadow-glow);
            transform: translateY(-2px);
        }

        /* Data table scroll */
        .data-table {
            max-height: 400px;
            overflow-y: auto;
        }
        .data-table::-webkit-scrollbar { width: 6px; }
        .data-table::-webkit-scrollbar-track { background: transparent; }
        .data-table::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

        /* Links */
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: #2563eb; }

        /* Step progress */
        .step-circle {
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .step-active {
            background: linear-gradient(135deg, var(--accent), #06b6d4);
            color: white;
            box-shadow: 0 4px 15px rgba(59,130,246,0.3);
        }
        .step-done {
            background: var(--success);
            color: white;
            box-shadow: 0 4px 15px rgba(0,184,148,0.25);
        }
        .step-pending {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
        }
        .step-line {
            height: 3px;
            width: 60px;
            margin-bottom: 22px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .step-line-done { background: var(--success); }
        .step-line-pending { background: var(--border-subtle); }

        /* Radio items */
        .rz-radio-item {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .rz-radio-item:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-light);
        }
        .rz-radio-item:has(input:checked) {
            border-color: var(--accent);
            background: var(--accent-soft);
            box-shadow: 0 0 20px rgba(59,130,246,0.08);
        }
        .form-check-input:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/"><span>⚡ Razgon</span></a>
            {% if session.get('user_name') %}
            <div class="d-flex align-items-center gap-2">
                <span style="color:var(--text-secondary);font-size:0.85rem;">{{ session['user_name'] }}</span>
                <a href="/dashboard" class="btn btn-ghost btn-sm">Кабинет</a>
                <a href="/auth/logout" class="btn btn-ghost btn-sm">Выйти</a>
            </div>
            {% else %}
            <a href="/auth/login" class="btn btn-accent btn-sm">Войти через Яндекс</a>
            {% endif %}
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
