<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Razgon{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 80px 0; }
        .feature-icon { font-size: 2.5rem; margin-bottom: 1rem; }
        .chat-box { height: 400px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; background: #f8f9fa; }
        .chat-msg { margin-bottom: 12px; }
        .chat-msg.user { text-align: right; }
        .chat-msg .bubble { display: inline-block; max-width: 75%; padding: 10px 14px; border-radius: 12px; }
        .chat-msg.user .bubble { background: #667eea; color: white; }
        .chat-msg.assistant .bubble { background: white; border: 1px solid #dee2e6; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">⚡ Razgon</a>
            {% if session.get('user_name') %}
            <div class="d-flex align-items-center">
                <span class="text-light me-3">{{ session['user_name'] }}</span>
                <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">Кабинет</a>
                <a href="/auth/logout" class="btn btn-outline-light btn-sm">Выйти</a>
            </div>
            {% else %}
            <a href="/auth/login" class="btn btn-outline-light btn-sm">Войти</a>
            {% endif %}
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
