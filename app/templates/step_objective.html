{% extends "base.html" %}
{% block title %}Цель запуска — Razgon{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container" style="max-width:600px;">
        {% include "setup_progress.html" %}
        <h2 class="mb-3" style="font-weight:700;">Какая у вас цель?</h2>
        <p class="mb-4" style="color:var(--text-secondary);font-size:0.9rem;">Это поможет агенту дать более точные рекомендации.</p>

        <div class="d-flex flex-column gap-2 mb-4" id="objectives">
            <label class="rz-radio-item d-flex align-items-center">
                <input class="form-check-input me-3" type="radio" name="objective" value="sales" checked>
                <div><strong><i class="bi bi-graph-up-arrow me-2"></i>Увеличить охват и продажи</strong></div>
            </label>
            <label class="rz-radio-item d-flex align-items-center">
                <input class="form-check-input me-3" type="radio" name="objective" value="optimize">
                <div><strong><i class="bi bi-piggy-bank me-2"></i>Сэкономить на рекламе</strong></div>
            </label>
            <label class="rz-radio-item d-flex align-items-center">
                <input class="form-check-input me-3" type="radio" name="objective" value="efficiency">
                <div><strong><i class="bi bi-lightning-charge me-2"></i>Поднять эффективность сайта</strong></div>
            </label>
            <label class="rz-radio-item d-flex align-items-center">
                <input class="form-check-input me-3" type="radio" name="objective" value="audience">
                <div><strong><i class="bi bi-people me-2"></i>Понять портрет клиента</strong></div>
            </label>
            <label class="rz-radio-item d-flex align-items-center">
                <input class="form-check-input me-3" type="radio" name="objective" value="custom" id="customObjRadio">
                <div class="w-100">
                    <strong><i class="bi bi-pencil me-2"></i>Свой вариант</strong>
                    <input type="text" class="form-control chat-control form-control-sm mt-2" id="customObjInput" placeholder="Опишите свою цель..." style="display:none">
                </div>
            </label>
        </div>

        <div class="d-flex gap-2">
            <a href="/setup/goal" class="btn btn-ghost" style="padding:0.65rem 1.2rem;">← Назад</a>
            <button id="nextBtn" class="btn btn-accent flex-grow-1">Создать отчёт <i class="bi bi-lightning-charge-fill ms-1"></i></button>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
document.querySelectorAll('input[name="objective"]').forEach(radio => {
    radio.addEventListener('change', () => {
        document.getElementById('customObjInput').style.display =
            radio.value === 'custom' && radio.checked ? 'block' : 'none';
    });
});

document.getElementById('nextBtn').addEventListener('click', () => {
    const r = document.querySelector('input[name="objective"]:checked');
    let objective = r.value;
    if (objective === 'custom') {
        objective = document.getElementById('customObjInput').value.trim();
        if (!objective) return alert('Опишите свою цель');
    }

    const btn = document.getElementById('nextBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Создаю...';

    fetch('/setup/api/objective', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({objective})
    }).then(() => {
        return fetch('/api/projects', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({})
        });
    }).then(r => r.json()).then(data => {
        window.location.href = '/project/' + data.project_id + '/report';
    }).catch(e => {
        alert('Ошибка: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Создать отчёт ⚡';
    });
});
</script>
{% endblock %}
